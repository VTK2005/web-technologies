<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Book Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff8f0;
      color: #2d1b00;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #bf360c, #e64a19);
      color: white;
      padding: 20px 32px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 12px rgba(191,54,12,.35);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header span { font-size: 1.9rem; }

    .container { max-width: 1150px; margin: 28px auto; padding: 0 20px; }

    /* Toast */
    #toast {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      padding: 13px 22px; border-radius: 10px; font-weight: 600; font-size: .93rem;
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
      opacity: 0; transform: translateY(-12px);
      transition: all .3s ease; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
    #toast.error   { background: #fce4ec; color: #c62828; border-left: 4px solid #e53935; }

    /* Loading */
    #loadingBar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: #ff7043; width: 0;
      transition: width .4s ease; z-index: 9998;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 4px 20px rgba(191,54,12,.08);
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1.1rem; color: #bf360c; margin-bottom: 16px; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .tab {
      padding: 9px 18px; border-radius: 24px; border: 2px solid #e0e0e0;
      background: white; cursor: pointer; font-weight: 600; font-size: .88rem;
      transition: all .2s; color: #666;
    }
    .tab.active, .tab:hover {
      background: #bf360c; color: white; border-color: #bf360c;
    }

    /* Controls */
    .control-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    input[type=text], select {
      padding: 10px 14px; border: 1.5px solid #e0c8b4;
      border-radius: 8px; font-size: .95rem; flex: 1; min-width: 180px;
      font-family: inherit; transition: border .2s;
    }
    input:focus, select:focus {
      outline: none; border-color: #e64a19;
      box-shadow: 0 0 0 3px rgba(230,74,25,.12);
    }
    button {
      padding: 10px 22px; border: none; border-radius: 8px;
      font-weight: 600; font-size: .9rem; cursor: pointer; transition: all .2s;
    }
    .btn-primary { background: #e64a19; color: white; }
    .btn-primary:hover { background: #bf360c; transform: translateY(-1px); }
    .btn-secondary { background: #fbe9e7; color: #bf360c; }
    .btn-secondary:hover { background: #ffccbc; }

    /* Book Grid */
    #booksGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .book-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 14px rgba(191,54,12,.08);
      border-left: 4px solid #e64a19;
      transition: transform .2s, box-shadow .2s;
    }
    .book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(191,54,12,.15); }

    .book-card .cat-badge {
      display: inline-block; background: #fbe9e7; color: #bf360c;
      padding: 3px 10px; border-radius: 20px;
      font-size: .72rem; font-weight: 700; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .book-card h3 { font-size: 1rem; margin-bottom: 4px; line-height: 1.3; }
    .book-card .author { font-size: .83rem; color: #888; margin-bottom: 10px; }

    .book-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f5e5da;
    }
    .price { font-weight: 700; color: #2e7d32; font-size: .95rem; }
    .stars { color: #f57f17; font-size: .88rem; }
    .year  { font-size: .78rem; color: #aaa; }

    /* Pagination */
    #pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 20px;
    }
    #pagination button { padding: 8px 18px; }
    #pageInfo { font-size: .9rem; color: #888; }

    .empty-state {
      text-align: center; padding: 50px 20px; color: #d7a88c;
      grid-column: 1/-1;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <span>📚</span>
  <h1>Online Book Finder</h1>
</header>

<div id="toast"></div>
<div id="loadingBar"></div>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'all')">📋 All Books</div>
    <div class="tab" onclick="switchTab(event, 'search')">🔍 Search by Title</div>
    <div class="tab" onclick="switchTab(event, 'category')">🏷️ Filter by Category</div>
    <div class="tab" onclick="switchTab(event, 'sort')">↕️ Sort Books</div>
    <div class="tab" onclick="switchTab(event, 'top')">⭐ Top Rated</div>
  </div>

  <!-- All Books (Pagination) -->
  <div id="tab-all" class="card tab-panel">
    <h2>📋 All Books</h2>
    <div id="booksGrid"></div>
    <div id="pagination" style="display:none;">
      <button class="btn-secondary" id="prevBtn" onclick="changePage(-1)">◀ Prev</button>
      <span id="pageInfo">Page 1</span>
      <button class="btn-secondary" id="nextBtn" onclick="changePage(1)">Next ▶</button>
    </div>
  </div>

  <!-- Search -->
  <div id="tab-search" class="card tab-panel" style="display:none;">
    <h2>🔍 Search Books by Title</h2>
    <div class="control-row" style="margin-bottom:20px;">
      <input type="text" id="searchInput" placeholder="e.g. JavaScript" onkeydown="if(event.key==='Enter')searchBooks()"/>
      <button class="btn-primary" onclick="searchBooks()">Search</button>
    </div>
    <div id="searchGrid" class="grid-wrapper"></div>
  </div>

  <!-- Category -->
  <div id="tab-category" class="card tab-panel" style="display:none;">
    <h2>🏷️ Filter by Category</h2>
    <div class="control-row" style="margin-bottom:20px;">
      <select id="categorySelect">
        <option value="">Select a category...</option>
        <option value="Programming">Programming</option>
        <option value="Database">Database</option>
        <option value="AI/ML">AI / ML</option>
        <option value="Engineering">Engineering</option>
        <option value="DevOps">DevOps</option>
        <option value="Web Design">Web Design</option>
        <option value="CS Theory">CS Theory</option>
        <option value="Networking">Networking</option>
        <option value="OS">Operating Systems</option>
        <option value="Tools">Tools</option>
      </select>
      <button class="btn-primary" onclick="filterByCategory()">Filter</button>
    </div>
    <div id="categoryGrid" class="grid-wrapper"></div>
  </div>

  <!-- Sort -->
  <div id="tab-sort" class="card tab-panel" style="display:none;">
    <h2>↕️ Sort Books</h2>
    <div class="control-row" style="margin-bottom:20px;">
      <button class="btn-primary" onclick="sortBooks('price')">📈 Sort by Price (Low → High)</button>
      <button class="btn-primary" onclick="sortBooks('rating')">⭐ Sort by Rating (High → Low)</button>
    </div>
    <div id="sortGrid" class="grid-wrapper"></div>
  </div>

  <!-- Top Rated -->
  <div id="tab-top" class="card tab-panel" style="display:none;">
    <h2>⭐ Top Rated Books (Rating ≥ 4.0)</h2>
    <div id="topGrid" class="grid-wrapper"></div>
  </div>

</div>

<script>
const API = 'http://localhost:4000/books';
let currentPage = 1;
let totalPages  = 1;

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = `show ${type}`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3000);
}

// ─── Loading Bar ──────────────────────────────────────────────────────────────
function setLoading(on) {
  const bar = document.getElementById('loadingBar');
  bar.style.width = on ? '70%' : '100%';
  if (!on) setTimeout(() => bar.style.width = '0', 400);
}

// ─── Fetch helper ─────────────────────────────────────────────────────────────
async function apiFetch(url) {
  const res  = await fetch(url);
  const data = await res.json();
  if (!res.ok || !data.success) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(e, name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).style.display = '';
  if (e && e.target) {
    e.target.classList.add('active');
  } else {
    // Fallback if needed
    document.querySelector(`[onclick*="${name}"]`).classList.add('active');
  }

  if (name === 'all')  loadAll();
  if (name === 'top')  loadTopRated();
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function stars(rating) {
  const full  = Math.floor(rating);
  const half  = rating % 1 >= .5 ? '½' : '';
  return '★'.repeat(full) + half + ` (${rating})`;
}

function bookCard(b) {
  return `
    <div class="book-card">
      <span class="cat-badge">${escHtml(b.category)}</span>
      <h3>${escHtml(b.title)}</h3>
      <div class="author">by ${escHtml(b.author)} · ${b.year}</div>
      <div class="book-meta">
        <span class="price">₹${b.price}</span>
        <span class="stars">${stars(b.rating)}</span>
      </div>
    </div>`;
}

function renderGrid(containerId, books) {
  const el = document.getElementById(containerId);
  if (!books || books.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No books found.</p></div>`;
    el.style.display = 'block';
    return;
  }
  el.style.display = 'grid';
  el.style.gridTemplateColumns = 'repeat(auto-fill, minmax(260px, 1fr))';
  el.style.gap = '18px';
  el.innerHTML = books.map(bookCard).join('');
}

// ─── 1. All Books with Pagination ────────────────────────────────────────────
// GET /books?page=N  →  db.books.find().skip().limit()
async function loadAll(page = 1) {
  setLoading(true);
  try {
    const data = await apiFetch(`${API}?page=${page}`);
    currentPage = data.page;
    totalPages  = data.totalPages;

    renderGrid('booksGrid', data.data);

    const pag = document.getElementById('pagination');
    pag.style.display = data.totalPages > 1 ? 'flex' : 'none';
    document.getElementById('pageInfo').textContent =
      `Page ${data.page} of ${data.totalPages} (${data.totalBooks} books)`;
    document.getElementById('prevBtn').disabled = data.page <= 1;
    document.getElementById('nextBtn').disabled = data.page >= data.totalPages;
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    setLoading(false);
  }
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next >= 1 && next <= totalPages) loadAll(next);
}

// ─── 2. Search by Title ──────────────────────────────────────────────────────
// GET /books/search?title=...  →  db.books.find({ title: { $regex, $options:"i" } })
async function searchBooks() {
  const term = document.getElementById('searchInput').value.trim();
  if (!term) { showToast('Enter a search term', 'error'); return; }

  setLoading(true);
  try {
    const data = await apiFetch(`${API}/search?title=${encodeURIComponent(term)}`);
    renderGrid('searchGrid', data.data);
    showToast(`Found ${data.count} result(s) for "${term}"`);
  } catch (err) {
    showToast(err.message, 'error');
    document.getElementById('searchGrid').innerHTML = '';
  } finally {
    setLoading(false);
  }
}

// ─── 3. Filter by Category ───────────────────────────────────────────────────
// GET /books/category/:name  →  db.books.find({ category: "..." })
async function filterByCategory() {
  const cat = document.getElementById('categorySelect').value;
  if (!cat) { showToast('Please select a category', 'error'); return; }

  setLoading(true);
  try {
    const data = await apiFetch(`${API}/category/${encodeURIComponent(cat)}`);
    renderGrid('categoryGrid', data.data);
    showToast(`${data.count} book(s) in "${cat}"`);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    setLoading(false);
  }
}

// ─── 4. Sort Books ───────────────────────────────────────────────────────────
// GET /books/sort/price  →  db.books.find().sort({ price: 1 })
// GET /books/sort/rating →  db.books.find().sort({ rating: -1 })
async function sortBooks(field) {
  setLoading(true);
  try {
    const data = await apiFetch(`${API}/sort/${field}`);
    renderGrid('sortGrid', data.data);
    const label = field === 'price' ? 'price (low to high)' : 'rating (high to low)';
    showToast(`Sorted ${data.data.length} books by ${label}`);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    setLoading(false);
  }
}

// ─── 5. Top Rated ─────────────────────────────────────────────────────────────
// GET /books/top  →  db.books.find({ rating: { $gte: 4 } }).limit(5)
async function loadTopRated() {
  setLoading(true);
  try {
    const data = await apiFetch(`${API}/top`);
    renderGrid('topGrid', data.data);
    showToast(`Showing top ${data.count} rated books`);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    setLoading(false);
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
