<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Shopping Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🛒 Smart Discount Cart</h1>

  <div class="products">
    <button onclick="addProduct(0)">Add Laptop</button>
    <button onclick="addProduct(1)">Add Headphones</button>
    <button onclick="addProduct(2)">Add Apples</button>
  </div>

  <div class="coupon-box">
    <input type="text" id="coupon" placeholder="Enter coupon code">
    <button onclick="applyCoupon()">Apply</button>
  </div>

  <div class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="summary">
      <p id="discountInfo"></p>
      <h3>Total: ₹<span id="total">0</span></h3>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
