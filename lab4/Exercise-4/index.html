<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h2>Weather Dashboard</h2>
    <p class="subtext">Search any city weather instantly</p>

    <div class="searchBox">
      <input type="text" id="city" placeholder="Enter city name..." />
      <button id="btn">Search</button>
    </div>

    <div id="loader" class="loader hidden"></div>
    <p id="errorMsg" class="errorMsg"></p>

    <div id="weatherCard" class="weatherCard hidden">
      <h3 id="cityName"></h3>
      <p><b>Temperature:</b> <span id="temp"></span> °C</p>
      <p><b>Humidity:</b> <span id="humidity"></span> %</p>
      <p><b>Condition:</b> <span id="condition"></span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
